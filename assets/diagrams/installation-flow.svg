<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="780" height="400">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: bold; fill: #a78bfa; }
    .label { font-size: 12px; fill: #e0e0e0; }
    .sublabel { font-size: 11px; fill: #9ca3af; }
    .cmd { font-size: 10px; fill: #4ade80; }
    .step-num { font-size: 18px; font-weight: bold; fill: #fbbf24; }
    .box { fill: #1e1e2e; stroke: #6366f1; stroke-width: 1.5; rx: 8; }
    .box-done { fill: #1a2e1a; stroke: #4ade80; stroke-width: 1.5; rx: 8; }
    .arrow { stroke: #6366f1; stroke-width: 2; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="780" height="400" fill="#0d0d1a" rx="8"/>
  <text x="390" y="30" text-anchor="middle" class="title">From Zip to Working Skill in 5 Steps</text>

  <!-- Step 1 -->
  <rect x="20" y="60" width="140" height="110" class="box"/>
  <text x="90" y="85" text-anchor="middle" class="step-num">1</text>
  <text x="90" y="105" text-anchor="middle" class="label">Get the zip</text>
  <line x1="20" y1="115" x2="160" y2="115" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="90" y="135" text-anchor="middle" class="sublabel">claude-</text>
  <text x="90" y="150" text-anchor="middle" class="sublabel">internals.zip</text>
  <text x="90" y="165" text-anchor="middle" class="sublabel">(171KB)</text>

  <line x1="160" y1="115" x2="180" y2="115" class="arrow"/>

  <!-- Step 2 -->
  <rect x="180" y="60" width="140" height="110" class="box"/>
  <text x="250" y="85" text-anchor="middle" class="step-num">2</text>
  <text x="250" y="105" text-anchor="middle" class="label">mkdir + unzip</text>
  <line x1="180" y1="115" x2="320" y2="115" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="250" y="133" text-anchor="middle" class="cmd">mkdir -p ~/.claude/</text>
  <text x="250" y="148" text-anchor="middle" class="cmd">  skills/claude-</text>
  <text x="250" y="163" text-anchor="middle" class="cmd">  internals</text>

  <line x1="320" y1="115" x2="340" y2="115" class="arrow"/>

  <!-- Step 3 -->
  <rect x="340" y="60" width="140" height="110" class="box"/>
  <text x="410" y="85" text-anchor="middle" class="step-num">3</text>
  <text x="410" y="105" text-anchor="middle" class="label">chmod scripts</text>
  <line x1="340" y1="115" x2="480" y2="115" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="410" y="133" text-anchor="middle" class="cmd">chmod +x</text>
  <text x="410" y="148" text-anchor="middle" class="cmd">scripts/*.sh</text>
  <text x="410" y="163" text-anchor="middle" class="cmd">scripts/*.js</text>

  <line x1="480" y1="115" x2="500" y2="115" class="arrow"/>

  <!-- Step 4 -->
  <rect x="500" y="60" width="140" height="110" class="box"/>
  <text x="570" y="85" text-anchor="middle" class="step-num">4</text>
  <text x="570" y="105" text-anchor="middle" class="label">Restart Claude</text>
  <line x1="500" y1="115" x2="640" y2="115" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="570" y="135" text-anchor="middle" class="sublabel">Skills register</text>
  <text x="570" y="150" text-anchor="middle" class="sublabel">at startup</text>

  <line x1="640" y1="115" x2="660" y2="115" class="arrow" style="stroke: #4ade80; marker-end: url(#arr-g);"/>

  <!-- Step 5 -->
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>
  <rect x="660" y="60" width="100" height="110" class="box-done"/>
  <text x="710" y="85" text-anchor="middle" class="step-num" style="fill: #4ade80;">5</text>
  <text x="710" y="105" text-anchor="middle" class="label" style="fill: #4ade80;">Use it!</text>
  <line x1="660" y1="115" x2="760" y2="115" style="stroke: #2d5a2d; stroke-width: 0.5;"/>
  <text x="710" y="133" text-anchor="middle" class="cmd">/claude-</text>
  <text x="710" y="148" text-anchor="middle" class="cmd">internals</text>
  <text x="710" y="163" text-anchor="middle" class="cmd">hooks</text>

  <!-- Bottom: what you get -->
  <rect x="40" y="220" width="700" height="150" class="box" style="stroke: #818cf8;"/>
  <text x="390" y="248" text-anchor="middle" class="title" style="fill: #818cf8;">What You Get After Installation</text>

  <!-- Three capabilities -->
  <rect x="60" y="265" width="200" height="85" style="fill: #1a1a2e; stroke: #fbbf24; stroke-width: 1; rx: 6;"/>
  <text x="160" y="288" text-anchor="middle" class="label" style="fill: #fbbf24;">/claude-internals [topic]</text>
  <text x="160" y="308" text-anchor="middle" class="sublabel">Ask Claude about any of</text>
  <text x="160" y="323" text-anchor="middle" class="sublabel">50 internal subsystems</text>
  <text x="160" y="340" text-anchor="middle" class="sublabel">with source-level depth</text>

  <rect x="290" y="265" width="200" height="85" style="fill: #1a1a2e; stroke: #38bdf8; stroke-width: 1; rx: 6;"/>
  <text x="390" y="288" text-anchor="middle" class="label" style="fill: #38bdf8;">3-Layer Search</text>
  <text x="390" y="308" text-anchor="middle" class="sublabel">Keyword (instant)</text>
  <text x="390" y="323" text-anchor="middle" class="sublabel">TF-IDF (~50ms)</text>
  <text x="390" y="340" text-anchor="middle" class="sublabel">Neural (~6ms, +Ruflo)</text>

  <rect x="520" y="265" width="200" height="85" style="fill: #1a1a2e; stroke: #f472b6; stroke-width: 1; rx: 6;"/>
  <text x="620" y="288" text-anchor="middle" class="label" style="fill: #f472b6;">Auto-Nudge Hook</text>
  <text x="620" y="308" text-anchor="middle" class="sublabel">Reminds Claude to check</text>
  <text x="620" y="323" text-anchor="middle" class="sublabel">internals before editing</text>
  <text x="620" y="340" text-anchor="middle" class="sublabel">.claude/ config files</text>
</svg>