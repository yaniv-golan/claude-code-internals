<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: bold; fill: #a78bfa; }
    .label { font-size: 12px; fill: #e0e0e0; }
    .sublabel { font-size: 11px; fill: #9ca3af; }
    .box { fill: #1e1e2e; stroke: #6366f1; stroke-width: 1.5; rx: 6; }
    .box-yes { fill: #1a2e1a; stroke: #4ade80; stroke-width: 1.5; rx: 6; }
    .box-no { fill: #1e1e2e; stroke: #9ca3af; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #6366f1; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .arrow-yes { stroke: #4ade80; stroke-width: 1.5; fill: none; marker-end: url(#ah-green); }
    .arrow-no { stroke: #9ca3af; stroke-width: 1.5; fill: none; marker-end: url(#ah-gray); }
    .diamond { fill: #1e1e2e; stroke: #fbbf24; stroke-width: 1.5; }
    .branch-label { font-size: 10px; font-weight: bold; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="ah-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="700" height="520" fill="#0d0d1a" rx="8"/>

  <!-- Trigger -->
  <rect x="175" y="20" width="350" height="40" class="box" style="stroke: #a78bfa;"/>
  <text x="350" y="45" text-anchor="middle" class="title">PreToolUse fires on Edit/Write/Bash</text>

  <!-- Arrow -->
  <line x1="350" y1="60" x2="350" y2="90" class="arrow"/>

  <!-- Hook box -->
  <rect x="200" y="90" width="300" height="80" class="box"/>
  <text x="350" y="115" text-anchor="middle" class="label">config-aware-hook.sh</text>
  <text x="350" y="135" text-anchor="middle" class="sublabel">Parses tool_input JSON</text>
  <text x="350" y="153" text-anchor="middle" class="sublabel">Checks if path contains .claude/</text>

  <!-- Arrow to diamond -->
  <line x1="350" y1="170" x2="350" y2="210" class="arrow"/>

  <!-- Decision diamond -->
  <polygon points="350,210 470,260 350,310 230,260" class="diamond"/>
  <text x="350" y="256" text-anchor="middle" class="label" style="fill: #fbbf24;">targets</text>
  <text x="350" y="272" text-anchor="middle" class="label" style="fill: #fbbf24;">.claude/?</text>

  <!-- YES branch (left) -->
  <line x1="230" y1="260" x2="130" y2="260" class="arrow-yes"/>
  <line x1="130" y1="260" x2="130" y2="340" class="arrow-yes"/>
  <text x="175" y="252" text-anchor="middle" class="branch-label" style="fill: #4ade80;">YES</text>

  <!-- YES box -->
  <rect x="30" y="340" width="200" height="70" class="box-yes"/>
  <text x="130" y="365" text-anchor="middle" class="label" style="fill: #4ade80;">stdout: reminder</text>
  <text x="130" y="385" text-anchor="middle" class="sublabel">exit 0 (proceed)</text>
  <text x="130" y="400" text-anchor="middle" class="sublabel" style="fill: #4ade80;">tool runs normally</text>

  <!-- Arrow to model output -->
  <line x1="130" y1="410" x2="130" y2="450" class="arrow-yes"/>

  <!-- Model sees box -->
  <rect x="15" y="450" width="230" height="50" class="box-yes"/>
  <text x="130" y="473" text-anchor="middle" class="sublabel" style="fill: #4ade80;">Model sees: &quot;Consult</text>
  <text x="130" y="489" text-anchor="middle" class="sublabel" style="fill: #4ade80;">/claude-internals [topic]&quot;</text>

  <!-- NO branch (right) -->
  <line x1="470" y1="260" x2="570" y2="260" class="arrow-no"/>
  <line x1="570" y1="260" x2="570" y2="340" class="arrow-no"/>
  <text x="525" y="252" text-anchor="middle" class="branch-label" style="fill: #9ca3af;">NO</text>

  <!-- NO box -->
  <rect x="470" y="340" width="200" height="70" class="box-no"/>
  <text x="570" y="365" text-anchor="middle" class="label">silent exit 0</text>
  <text x="570" y="385" text-anchor="middle" class="sublabel">(no output)</text>
  <text x="570" y="400" text-anchor="middle" class="sublabel">tool runs normally</text>

  <!-- Footer -->
  <text x="350" y="510" text-anchor="middle" class="sublabel" style="fill: #6366f1;">PreToolUse Hook — .claude/ Config Detection</text>
</svg>