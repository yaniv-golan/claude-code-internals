<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" width="800" height="680">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: bold; fill: #a78bfa; }
    .label { font-size: 12px; fill: #e0e0e0; }
    .sublabel { font-size: 11px; fill: #9ca3af; }
    .box { fill: #1e1e2e; stroke: #6366f1; stroke-width: 1.5; rx: 6; }
    .box-search { fill: #1a1a2e; stroke: #818cf8; stroke-width: 1.5; rx: 6; }
    .box-output { fill: #1a1a2e; stroke: #4ade80; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #6366f1; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-fan { stroke: #818cf8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-merge { stroke: #4ade80; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); }
    .result-label { font-size: 10px; fill: #4ade80; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>
  <rect width="800" height="680" fill="#0d0d1a" rx="8"/>

  <!-- User Query -->
  <rect x="230" y="20" width="340" height="40" class="box" style="stroke: #a78bfa;"/>
  <text x="400" y="45" text-anchor="middle" class="title">User: /claude-internals hooks</text>

  <!-- Arrow down -->
  <line x1="400" y1="60" x2="400" y2="90" class="arrow"/>

  <!-- SKILL.md brain -->
  <rect x="250" y="90" width="300" height="60" class="box"/>
  <text x="400" y="115" text-anchor="middle" class="label">SKILL.md (brain)</text>
  <text x="400" y="133" text-anchor="middle" class="sublabel">Parses topic, chooses search strategy</text>

  <!-- Fan-out arrows -->
  <line x1="320" y1="150" x2="130" y2="200" class="arrow-fan"/>
  <line x1="400" y1="150" x2="400" y2="200" class="arrow-fan"/>
  <line x1="480" y1="150" x2="670" y2="200" class="arrow-fan"/>

  <!-- Layer 1: Keyword -->
  <rect x="30" y="200" width="200" height="130" class="box-search"/>
  <text x="130" y="225" text-anchor="middle" class="label" style="fill: #fbbf24;">Layer 1: lookup.sh</text>
  <text x="130" y="245" text-anchor="middle" class="sublabel">(keyword)</text>
  <line x1="30" y1="255" x2="230" y2="255" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="130" y="275" text-anchor="middle" class="sublabel">jq query against</text>
  <text x="130" y="293" text-anchor="middle" class="sublabel">494 indexed keywords</text>
  <text x="130" y="318" text-anchor="middle" class="result-label">file:line refs</text>

  <!-- Layer 2: TF-IDF -->
  <rect x="280" y="200" width="240" height="130" class="box-search"/>
  <text x="400" y="225" text-anchor="middle" class="label" style="fill: #38bdf8;">Layer 2: semantic-search.js</text>
  <text x="400" y="245" text-anchor="middle" class="sublabel">(TF-IDF)</text>
  <line x1="280" y1="255" x2="520" y2="255" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="400" y="275" text-anchor="middle" class="sublabel">Cosine similarity against</text>
  <text x="400" y="293" text-anchor="middle" class="sublabel">50 lesson TF-IDF vectors</text>
  <text x="400" y="318" text-anchor="middle" class="result-label">ranked lessons</text>

  <!-- Layer 3: Neural -->
  <rect x="570" y="200" width="200" height="130" class="box-search"/>
  <text x="670" y="225" text-anchor="middle" class="label" style="fill: #f472b6;">Layer 3: Ruflo Neural</text>
  <text x="670" y="245" text-anchor="middle" class="sublabel">(ONNX MiniLM)</text>
  <line x1="570" y1="255" x2="770" y2="255" style="stroke: #333; stroke-width: 0.5;"/>
  <text x="670" y="275" text-anchor="middle" class="sublabel">Embeddings search</text>
  <text x="670" y="293" text-anchor="middle" class="sublabel">across 50 lesson vectors</text>
  <text x="670" y="318" text-anchor="middle" class="result-label">similarity scores</text>

  <!-- Merge arrows -->
  <line x1="130" y1="330" x2="400" y2="400" class="arrow-merge"/>
  <line x1="400" y1="330" x2="400" y2="400" class="arrow-merge"/>
  <line x1="670" y1="330" x2="400" y2="400" class="arrow-merge"/>

  <!-- Read matched section -->
  <rect x="250" y="400" width="300" height="70" class="box-output"/>
  <text x="400" y="425" text-anchor="middle" class="label">Read matched section</text>
  <text x="400" y="445" text-anchor="middle" class="sublabel">with offset/limit</text>
  <text x="400" y="460" text-anchor="middle" class="sublabel">(only load what's needed)</text>

  <!-- Arrow down -->
  <line x1="400" y1="470" x2="400" y2="510" class="arrow-merge"/>

  <!-- Synthesize -->
  <rect x="250" y="510" width="300" height="60" class="box-output"/>
  <text x="400" y="535" text-anchor="middle" class="label">Synthesize answer</text>
  <text x="400" y="555" text-anchor="middle" class="sublabel">&lt; 5KB with code examples</text>

  <!-- Speed labels -->
  <text x="130" y="345" text-anchor="middle" class="sublabel" style="fill: #fbbf24;">instant</text>
  <text x="400" y="345" text-anchor="middle" class="sublabel" style="fill: #38bdf8;">~50ms</text>
  <text x="670" y="345" text-anchor="middle" class="sublabel" style="fill: #f472b6;">~6ms</text>

  <!-- Footer -->
  <text x="400" y="610" text-anchor="middle" class="sublabel" style="fill: #6366f1;">Claude Internals Skill — Search Architecture</text>
</svg>